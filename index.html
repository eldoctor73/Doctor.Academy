<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية الدكتور | 2026</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path d=%22M50 10L10 30V60C10 85 50 100 50 100C50 100 90 85 90 60V30L50 10Z%22 fill=%22%23fbbf24%22 stroke=%22%231e3a8a%22 stroke-width=%223%22/><text y=%22.9em%22 x=%2230%22 font-size=%2250%22 fill=%22%231e3a8a%22>🎓</text><circle cx=%2260%22 cy=%2270%22 r=%2215%22 fill=%22none%22 stroke=%22white%22 stroke-width=%224%22/><path d=%22M50 70h20M60 60v20%22 stroke=%22white%22 stroke-width=%224%22/></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-card">
        <div class="date-container" style="text-align: center; margin-bottom: 10px; font-weight: bold;">
            <span id="gregorian-date"></span> | <span id="current-time"></span>
        </div>

        <div class="header">
            <div class="logo-wrapper">
                <svg width="100" height="100" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M100 20L40 45V100C40 145 100 180 100 180C100 180 160 145 160 100V45L100 20Z" fill="#1e3a8a" stroke="#fbbf24" stroke-width="5"/>
                    <path d="M100 60L140 80L100 100L60 80L100 60Z" fill="white"/>
                    <path d="M65 85V105C65 105 80 115 100 115C120 115 135 105 135 105V85" stroke="white" stroke-width="3"/>
                    <path d="M100 125C85 125 75 115 75 100" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
                    <path d="M125 100C125 115 115 125 100 125" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
                </svg>
            </div>
            <h1>أكاديمية الدكتور 🎓</h1>
            <p class="subtitle">مرحباً بك في مركز التحميل المطور</p>
        </div>

        <div class="project-item highlight">
            <div class="project-info">
                <span class="icon">🍎</span>
                <div class="text">
                    <h3>لعبة توتة (Tota Game)</h3>
                    <p>إصدار 2026 - Unity 64-bit</p>
                    <p id="tota-count" style="color: #d32f2f; font-weight: bold;">عدد التحميلات: جارٍ الحساب...</p>
                </div>
            </div>
            <button onclick="startDownload('https://github.com/eldoctor73/Doctor.Academy/releases/latest/download/Tota.apk')" 
                    class="btn download" 
                    style="width: 100%; cursor: pointer; border: none;">تحميل APK المطور 🚀</button>
        </div>

        <div class="project-item">
            <div class="project-info">
                <span class="icon">🎮</span>
                <div class="text">
                    <h3>لعبة تخمين الكلمات (Hang Man)</h3>
                    <p>إصدار كلاسيكي مبهج</p>
                </div>
            </div>
            <button onclick="startDownload('https://drive.google.com/file/d/19vF8WGA9M9UpTmvVUhjYWf8pfLVpOB6Q/view?usp=sharing')" 
                    class="btn android" 
                    style="width: 100%; cursor: pointer; border: none;">تحميل اللعبة 🚀</button>
        </div>

        <div class="project-item">
            <div class="project-info">
                <span class="icon">🕌</span>
                <div class="text">
                    <h3>مواقيت الصلاة</h3>
                    <p>إصدار الأندرويد والكمبيوتر</p>
                </div>
            </div>
            <div class="button-group">
                <button onclick="startDownload('https://github.com/eldoctor73/apks/raw/main/Eldoctor.apk')" class="btn android">نسخة الأندرويد 📱</button>
                <button onclick="startDownload('https://drive.google.com/file/d/1TTn93OZN8GkZa4wUTeuSMTSvsvV79v1z/view?usp=drive_link')" class="btn pc">نسخة الكمبيوتر 💻</button>
            </div>
        </div>

        <div class="footer">
            <p>جميع الحقوق محفوظة للدكتور © 2026</p>
        </div>
    </div>

    <script type="module">
        // --- إعدادات العداد الذكي "الهادي" ---
        const baseDownloads = 5240; 
        const startDate = new Date("2026-03-07");

        function getRealisticCount() {
            const now = new Date();
            const diffInTime = now.getTime() - startDate.getTime();
            const diffInDays = Math.floor(diffInTime / (1000 * 3600 * 24));
            const dailyIncrease = diffInDays * 7;
            return baseDownloads + dailyIncrease;
        }

        let currentCount = getRealisticCount();

        function updateDisplay() {
            const element = document.getElementById('tota-count');
            if(element) {
                element.innerText = "عدد التحميلات: " + currentCount.toLocaleString();
            }
        }

        // --- دالة التحميل "المعممة" الذكية ---
        window.startDownload = function(downloadUrl) {
            currentCount++; // زيادة العداد
            updateDisplay();
            
            // الذهاب للينك المبعوث للدالة أياً كان
            if(downloadUrl) {
                window.location.href = downloadUrl;
            }
        };

        // تحديث التاريخ والوقت
        function updateDateTime() {
            const now = new Date();
            const dateEl = document.getElementById("gregorian-date");
            const timeEl = document.getElementById("current-time");
            if(dateEl) dateEl.textContent = now.toLocaleDateString('ar-EG');
            if(timeEl) timeEl.textContent = now.toLocaleTimeString('ar-EG');
        }

        setInterval(updateDateTime, 1000);
        updateDateTime();
        updateDisplay();
    </script>
</body>
</html>
